name: Olympia CoreDAO
code: olympia-coredao
siteUrl: https://olympia-coredao.vercel.app
offChainDiscussionUrl: https://github.com/olympiadao/degov/discussions
editLink: https://github.com/olympiadao/degov/blob/olympia/degov.yml
description: |
  Olympia CoreDAO is the primary governance body for the Ethereum Classic network,
  handling client maintenance, hard fork implementations, emergency patches, and
  day-to-day operations per ECIP-1112/1113/1114. Core maintainers hold soulbound
  membership NFTs for identity-verified, non-transferable voting.

links:
  website: https://ethereumclassic.org
  twitter: https://x.com/EthClassicDAO
  github: https://github.com/olympiadao/degov

